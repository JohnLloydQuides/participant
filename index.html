<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>KKDAT Participant Registration System</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header class="site-header">
			<h1>KKDAT Participant Registration</h1>
			<p>Register and manage participants for events and workshops</p>
		</header>

		<main class="container form-only">
			<section class="left">
				<div class="card form-card">
					<h2>Registration Form</h2>
					<div id="formStatus" class="status-message" aria-live="polite"></div>
					<form id="regForm">
						<label>Full Name *
							<input type="text" id="fullName" required placeholder="Enter full name" />
						</label>

						<div class="row">
							<label>Age *
								<input type="number" id="age" required placeholder="Age" />
							</label>
							<label>Gender *
								<select id="gender" required>
									<option value="">Select gender</option>
									<option value="male">Male</option>
									<option value="female">Female</option>
									<option value="other">Other</option>
								</select>
							</label>
						</div>

						<label>Email *
							<input type="email" id="email" required placeholder="Enter email address" />
						</label>

						<label>Contact Number *
							<input type="tel" id="contact" required placeholder="Enter contact number" autocomplete="tel" />
						</label>

						<label>Address *
							<textarea id="address" required placeholder="Enter complete address"></textarea>
						</label>

						<div class="row">
							<label>Batch *
								<input type="text" id="batch" required placeholder="Example: 2026" />
							</label>
							<label>Batch Name (optional)
								<input type="text" id="batchName" placeholder="Example: Manabahe Batch" />
							</label>
						</div>

						<label>Event *
							<input type="text" id="event" required placeholder="Enter event name" />
						</label>

						<label>2x2 Photo (optional)
							<input type="file" id="photo" accept="image/*" />
						</label>

						<button type="submit" class="btn-primary">Register Participant</button>
					</form>
					<div id="doneRegistered" class="done-registered" hidden>
						<div class="done-icon" aria-hidden="true">✓</div>
						<h2>Done Registered</h2>
						<p>Your registration has been saved successfully.</p>
						<button type="button" id="registerAnother" class="btn-primary">Register Another Participant</button>
					</div>
				</div>
			</section>

		</main>

		<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
		<script src="script.js?v=10"></script>
	</body>
</html>
